[bot]
name       = "月灵"           # Bot 名称，AI 自我认知和消息触发词
data_dir   = "data"           # 数据根目录（图片素材 / 备份 / 数据库），Docker 中挂载为 volume
owner_id   = 0                # 群主 QQ 号，拥有最高权限
superusers = []               # 超级管理员 QQ 列表，可执行重启等操作
cmd_prefix = ""               # 命令前缀，空=无前缀；设为 "/" 则需要 /命令 触发
timezone   = "Asia/Shanghai"  # 时区，影响签到 / 提醒时间计算

[napcat]
# 二选一，serve 优先级更高
# 反向 WS（推荐，配合 docker-compose 的 napcat 服务）：NapCat 主动连 bot，填监听地址
# 然后在 NapCat WebUI 加「WebSocket 客户端」指向 ws://bot:9077/onebot/v11/ws
serve = ":9077"
# 正向 WS：bot 主动连 NapCat（NapCat 在宿主机用 ws://host.docker.internal:端口/...；同 compose 用 ws://napcat:3001）
# url = "ws://host:port/onebot/v11/ws"
token = ""  # 鉴权 token，与 NapCat 侧保持一致，留空则不验证

[ai]
deepseek_key = "sk-..."                    # DeepSeek API Key（必填）
base_url     = "https://api.deepseek.com"  # API Base URL
model        = "deepseek-chat"             # 模型名称

# 图片识别（可选）。不配 key 则 zssm 遇到图片回复「未配置图片识别」。
[ai.vl]
key = ""
base_url = "https://api.siliconflow.cn/v1"
model = "Qwen/Qwen2.5-VL-72B-Instruct"

# AI 调用频率限制（每分钟）。作用于用户触发的烧钱 AI：群聊 AI、zssm、翻译。
# 后台主动发言 / 记忆提取不计入。0 = 不限。私聊只走个人限制。
[ai.ratelimit]
user_per_min  = 5   # 每人每分钟上限
group_per_min = 15  # 每群每分钟上限

# AI 拉取群聊上下文的默认条数（模型没指定时用）。硬上限不变：聊天记录≤30、总结≤100。
[ai.context]
chat_history = 15   # get_chat_history（理解上下文/确定发言者）默认条数
summary      = 50   # summarize_chat（群聊总结）默认条数

[tools]
qweather_key  = ""  # 和风天气 API Key（天气工具，留空则禁用）
qweather_host = ""  # 和风天气自定义 Host
tavily_key    = ""  # Tavily API Key（网页搜索工具，留空则禁用）
proxy         = ""  # HTTP 代理，如 http://127.0.0.1:7890（trace.moe / Twitter / Behance 需要）
meme_server   = ""  # meme-generator-rs 地址，如 http://meme:2233（Docker）或 http://127.0.0.1:2233（本地）

[http_api]
# 外部系统凭 key 通过 HTTP 让 bot 发消息（POST /api/send）。addr 留空 = 关闭。
addr = ""          # 如 ":9078"；设置后必须同时设置 key
key  = ""          # Bearer 鉴权 key，addr 非空时必填

[image]
# 入库图片自动转 JPEG（添加老婆/老公/表情… 等收图命令），从根源减小素材体积。
# 透明 PNG 与 GIF 不转、转完反而更大也不转；关闭则原样存盘。
convert         = false  # 总开关，默认关
convert_min_kb  = 1024   # 仅原图 >= 此大小(KB) 才转，0 = 全部转
convert_quality = 85     # JPEG 质量 1-100

# ── 图片类目配置表（可选）────────────────────────────────────────────────
# 不配则用内置默认表（龙图/福瑞/老公/老婆/沙雕图/杂鱼/美少女/ba +
# 吃喝玩乐 4合1 + 随机猫猫）。一旦填写则【整体覆盖】默认表。
# kind: single=随机一张(默认) / grid=4合1网格 / external=外链
#   single/grid 需 folder+call；grid 的添加必须带名字；external 需 url。
#   external 的 pick=从返回 JSON 按点路径取图(遇数组随机)，空=响应本身即图。
# [[image.entry]]
# folder = "龙图"
# call   = ["龙图", "龙图攻击"]
# add    = "添加龙图"
# [[image.entry]]
# folder = "吃的"
# call   = ["随机吃的", "吃啥", "吃什么", "来点吃的"]
# add    = "添加吃的"
# kind   = "grid"
# [[image.entry]]
# call = ["随机猫猫", "来点猫猫"]
# kind = "external"
# url  = "http://edgecats.net/"
# [[image.entry]]
# call = ["来只狗"]
# kind = "external"
# url  = "https://api.example.com/dog"
# pick = "data.url"

[pack]
# pack 命令：回复一条消息发 pack，把其中的图片（含合并转发各层）打成 zip 上传到群文件。
max_images = 100  # 单次最多打包图片数
max_mb     = 100  # 单次累计下载上限(MB)，超过则只打包到上限为止
